<!doctype html>
<html><head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
  <meta charset="utf-8"><title>Chat — shin-pr-review-agent</title>
<style>
    :root {
      --bg: hsl(0 0% 100%);
      --fg: hsl(240 10% 3.9%);
      --border: hsl(240 5.9% 90%);
      --muted: hsl(240 4.8% 95.9%);
      --muted-fg: hsl(240 3.8% 46.1%);
      --sidebar-bg: hsl(240 4.8% 96.5%);
      --card: hsl(0 0% 100%);
      --primary: hsl(240 5.9% 10%);
      --primary-fg: hsl(0 0% 98%);
      --radius: 6px;
      --ring: hsl(240 5.9% 10%);
      --green-bg: hsl(152 60% 94%); --green-fg: hsl(152 65% 28%); --green-border: hsl(152 45% 84%);
      --amber-bg: hsl(38 92% 95%);  --amber-fg: hsl(38 92% 30%);  --amber-border: hsl(38 80% 82%);
      --red-bg:   hsl(0 72% 96%);   --red-fg:   hsl(0 72% 40%);   --red-border:   hsl(0 60% 88%);
      --blue-bg:  hsl(217 91% 95%); --blue-fg:  hsl(217 80% 38%); --blue-border:  hsl(217 70% 86%);
      --violet-bg:hsl(263 85% 96%); --violet-fg:hsl(263 70% 40%); --violet-border:hsl(263 60% 88%);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    :focus-visible{outline:2px solid var(--ring);outline-offset:2px;border-radius:calc(var(--radius) - 2px)}

    html{height:100%}
    body{font:13px/1.5 'Geist',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--fg);background:var(--bg);display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .app-body{display:flex;flex:1;overflow:hidden}

    /* ── Topbar (same as dashboard) ── */
    #topbar{position:fixed;top:0;left:0;right:0;height:57px;z-index:100;display:flex;align-items:center;gap:0;padding:0 20px;border-bottom:1px solid var(--border);background:hsla(0 0% 100% / 0.9);backdrop-filter:blur(12px)}
    .topbar-brand{display:flex;align-items:center;gap:8px;padding-right:16px;border-right:1px solid var(--border)}
    .topbar-brand-mark{font-size:17px;line-height:1}
    .topbar-brand-name{font-size:13px;font-weight:700;color:var(--fg);letter-spacing:-.01em}
    .topbar-nav{display:flex;align-items:center;gap:1px;padding:0 12px}
    .topbar-nav-item{display:inline-flex;align-items:center;padding:5px 11px;border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--muted-fg);border:1px solid transparent;text-decoration:none;transition:background .12s,color .12s,border-color .12s}
    .topbar-nav-item:hover{background:var(--muted);color:var(--fg)}
    .topbar-nav-item.active{background:var(--muted);color:var(--fg);border-color:var(--border)}

    #sidebar{width:240px;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;height:100%;flex-shrink:0;overflow:hidden}
    #sidebar-head{padding:10px 12px 9px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center}
    .sidebar-brand{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
    .sidebar-brand-mark{font-size:14px;line-height:1;flex-shrink:0}
    .sidebar-brand-name{font-size:12.5px;font-weight:700;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sidebar-nav-link{font-size:11px;color:var(--muted-fg);text-decoration:none;padding:4px 8px;border:1px solid transparent;border-radius:var(--radius);font-weight:500;transition:background .1s,color .1s,border-color .1s}
    .sidebar-nav-link:hover{background:var(--card);border-color:var(--border);color:var(--fg)}
    .sidebar-nav-link.active{background:var(--fg);color:var(--primary-fg);border-color:var(--fg)}
    #sidebar-head h2{font-size:12px;margin:0;font-weight:600;color:var(--fg)}
    #new-btn{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--fg);color:var(--primary-fg);cursor:pointer;font:inherit;font-size:11.5px;white-space:nowrap;transition:opacity .1s}
    #new-btn:hover{opacity:.85}
    #threads{flex:1;overflow-y:auto;padding:4px}
    .thread{padding:8px 10px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:2px;color:var(--muted-fg);transition:background .1s}
    .thread:hover{background:hsl(240 5.9% 91%)}
    .thread.active{background:var(--fg);color:var(--primary-fg)}
    .thread.active .del{color:hsl(240 5% 65%)}
    .thread .title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px;color:var(--fg)}
    .thread.active .title{color:var(--primary-fg)}
    .thread .del{border:0;background:transparent;color:var(--muted-fg);cursor:pointer;font-size:14px;padding:0 4px;visibility:hidden;border-radius:3px;transition:background .1s}
    .thread:hover .del{visibility:visible}
    .thread.active .del:hover{color:var(--primary-fg);background:hsla(0 0% 100% / .15)}
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .chat-header{padding:14px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
    .chat-header h1{font-size:16px;font-weight:700;margin:0 0 2px;letter-spacing:-.02em}
    .chat-sub{color:var(--muted-fg);font-size:11.5px}
    .chat-sub code{font-family:'Geist Mono',ui-monospace,Menlo,monospace;font-size:11px;background:var(--muted);border:1px solid var(--border);padding:1px 5px;border-radius:4px}
    #log{flex:1;border:0;border-top:1px solid var(--border);padding:14px 20px;overflow-y:auto;background:var(--bg)}
    .msg{margin:0 0 12px;white-space:pre-wrap;word-wrap:break-word;font-size:12.5px;line-height:1.6}
    .user{color:var(--green-fg);font-weight:500}
    .bot{color:var(--fg)}
    .tool{color:var(--muted-fg);font-family:'Geist Mono',ui-monospace,Menlo,monospace;font-size:11px;background:var(--muted);border:1px solid var(--border);border-left:3px solid var(--border);padding:5px 8px;margin:3px 0;border-radius:var(--radius)}
    .err{color:var(--red-fg)}
    .chat-input-wrap{display:flex;gap:8px;padding:10px 16px 14px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
    input[type=text]{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font:inherit;font-size:12.5px;background:var(--card);color:var(--fg);transition:border-color .1s}
    input[type=text]:focus{border-color:hsl(240 5% 65%);outline:none}
    input[type=text]::placeholder{color:hsl(240 5% 70%)}
    button[type=submit]{padding:9px 16px;border:1px solid var(--fg);border-radius:var(--radius);background:var(--fg);color:var(--primary-fg);cursor:pointer;font:inherit;font-size:12.5px;font-weight:500;white-space:nowrap;transition:opacity .1s}
    button[type=submit]:hover{opacity:.85}
    button[type=submit]:disabled{opacity:.5;cursor:wait}
    .hint{color:var(--muted-fg);font-size:11.5px;padding:0 16px 10px;line-height:1.5;flex-shrink:0}
    .empty{color:var(--muted-fg);font-size:12px;text-align:center;padding:16px;font-style:italic}
    #sidebar-foot{padding:8px 10px;border-top:1px solid var(--border)}
    #logout-form{margin:0}
    #logout-btn{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--muted-fg);cursor:pointer;font:inherit;font-size:12px;transition:background .1s}
    #logout-btn:hover{background:var(--muted)}

  </style></head>
<body>
<header id="topbar" role="banner">
  <div class="topbar-brand">
    <span class="topbar-brand-mark" aria-hidden="true">🚄</span>
    <span class="topbar-brand-name">shin-pr-review-agent</span>
  </div>
  <nav class="topbar-nav" aria-label="Main navigation">
    <a href="/dashboard" class="topbar-nav-item">Dashboard</a>
    <a href="/runs" class="topbar-nav-item">Runs</a>
    <a href="/chat" class="topbar-nav-item active" aria-current="page">Chat</a>
  </nav>
</header>
<div class="app-body">
<aside id="sidebar">
  <div id="sidebar-head">
    <h2 style="font-size:12px;font-weight:700;margin:0;flex:1;color:var(--fg)">Chats</h2>
    <button id="new-btn" type="button">+ New</button>
  </div>
  <div id="threads"></div>
  <div id="sidebar-foot">
    <form id="logout-form" method="post" action="/logout">
      <button id="logout-btn" type="submit">Sign out</button>
    </form>
  </div>
</aside>
<main id="main" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
  <header class="chat-header">
    <h1>Dev Chat</h1>
    <div class="chat-sub">Sends to <code>POST /chat/api</code> — same agent the Slack handler uses.</div>
  </header>
  <div id="log" role="log" aria-live="polite" aria-label="Chat messages"></div>
  <form id="f" class="chat-input-wrap">
    <input id="m" type="text" placeholder="Triage this PR: https://github.com/BerriAI/litellm/pull/123…" autofocus autocomplete="off" spellcheck="false" aria-label="Chat message">
    <button id="b" type="submit">Send</button>
  </form>
  <p class="hint">Tool calls show inline. First request can take 30–60&thinsp;s. You can switch threads while a request is in flight — the response will land in its origin thread.</p>
</main>
<script>
const log = document.getElementById('log');
const form = document.getElementById('f');
const input = document.getElementById('m');
const btn = document.getElementById('b');
const threadsEl = document.getElementById('threads');
const newBtn = document.getElementById('new-btn');

let threadId = localStorage.getItem('threadId');
// Per-thread in-flight state. If pending.has(id), there is a request out for
// that thread and we should show the user message + a thinking placeholder
// when that thread is the active view. Cleared when the response (or error)
// lands. This is what lets the user spawn / switch to other threads without
// the in-flight request blocking the UI.
const pending = new Map(); // threadId -> {userMessage: string}

// Client-minted threads that the server hasn't acknowledged yet. The submit
// handler registers an entry here *before* sending so the sidebar can render
// the row immediately (with the user's input as the title). On the next
// refreshThreads() the server-returned thread for this id replaces the
// optimistic stub. Cleared when the chat response for the thread lands.
const optimistic = new Map(); // threadId -> {title, updated_at}

function mintThreadId(){
  // crypto.randomUUID is available in all evergreen browsers; the dashes are
  // stripped to keep ids visually consistent with the server's uuid4().hex.
  return crypto.randomUUID().replace(/-/g, '');
}

function titleFromMessage(msg){
  // Mirror the server-side truncation in chat_api so the sidebar title
  // doesn't shift when the response lands and the server reconciles.
  return msg.length > 60 ? msg.slice(0, 60) + '…' : msg;
}

async function authFetch(url, opts){
  const r = await fetch(url, opts);
  if (r.status === 401) {
    window.location.href = '/login';
    throw new Error('redirecting to login');
  }
  return r;
}

function add(cls, text){
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function addTrace(trace){
  for (const t of trace) {
    if (t.kind === 'call') {
      add('tool', '→ ' + t.tool + '(' + JSON.stringify(t.args) + ')');
    } else if (t.kind === 'return' || t.kind === 'result') {
      add('tool', '← ' + t.tool + (t.isError ? ' ERROR' : '') + ': ' + t.preview);
    } else if (t.kind === 'label') {
      add('tool', '— ' + t.tool + ' —');
    }
  }
}

// Disable Send only for the active thread when its own request is in flight.
// Other threads (and brand-new ones) stay interactive.
function syncSendButton(){
  btn.disabled = !!(threadId && pending.has(threadId));
}

function setActiveThread(id){
  threadId = id;
  if (id) localStorage.setItem('threadId', id);
  else localStorage.removeItem('threadId');
  for (const el of threadsEl.querySelectorAll('.thread')) {
    el.classList.toggle('active', el.dataset.id === id);
  }
  syncSendButton();
}

// Cached last server-known thread list. renderThreads() uses this as its
// baseline so a synchronous repaint (e.g. after registering an optimistic
// thread) doesn't have to wait on a fetch.
let lastServerThreads = [];

function renderThreads(threads){
  if (threads !== undefined) lastServerThreads = threads;
  // Merge the cached server list with any client-minted threads the server
  // hasn't seen yet. Server entries win on duplicate id (their title is
  // canonical once they exist), so when the chat response lands and
  // refreshThreads() re-runs the optimistic stub gets replaced cleanly.
  const merged = new Map();
  for (const [id, stub] of optimistic) {
    merged.set(id, {id, title: stub.title, updated_at: stub.updated_at});
  }
  for (const t of lastServerThreads) {
    merged.set(t.id, t);
  }
  const rows = [...merged.values()].sort((a, b) => b.updated_at - a.updated_at);

  threadsEl.innerHTML = '';
  if (!rows.length) {
    const e = document.createElement('div');
    e.className = 'empty';
    e.textContent = 'No chats yet. Click + New to start.';
    threadsEl.appendChild(e);
    return;
  }
  for (const t of rows) {
    const row = document.createElement('div');
    row.className = 'thread' + (t.id === threadId ? ' active' : '');
    row.dataset.id = t.id;
    const title = document.createElement('span');
    title.className = 'title';
    title.textContent = t.title + (pending.has(t.id) ? ' …' : '');
    const del = document.createElement('button');
    del.className = 'del';
    del.textContent = '×';
    del.title = 'Delete chat';
    del.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('Delete this chat?')) return;
      // 404 is fine here — the thread may be optimistic-only (server never
      // saw it because the user deleted before submit completed).
      await authFetch('/chat/api/threads/' + t.id, {method: 'DELETE'}).catch(() => {});
      optimistic.delete(t.id);
      pending.delete(t.id);
      if (t.id === threadId) {
        log.innerHTML = '';
        setActiveThread(null);
      }
      await refreshThreads();
    });
    row.appendChild(title);
    row.appendChild(del);
    row.addEventListener('click', () => loadThread(t.id));
    threadsEl.appendChild(row);
  }
}

async function refreshThreads(){
  const r = await authFetch('/chat/api/threads');
  const threads = await r.json();
  renderThreads(threads);
}

async function loadThread(id){
  setActiveThread(id);
  log.innerHTML = '';
  const r = await authFetch('/chat/api/threads/' + id);
  if (!r.ok) {
    // 404 is expected for an optimistic thread whose first chat request is
    // still in flight — the server only creates the row when /chat/api hits
    // its upsert. Keep the thread active and replay the optimistic state
    // below; the post-response refresh will surface the real turns.
    if (r.status !== 404 || !optimistic.has(id)) {
      setActiveThread(null);
      await refreshThreads();
      return;
    }
  } else {
    const data = await r.json();
    for (const turn of data.turns) {
      if (turn.role === 'user') {
        add('user', '> ' + turn.content);
      } else {
        if (turn.tool_trace) addTrace(turn.tool_trace);
        add('bot', turn.content);
      }
    }
  }
  // If this thread has a request in flight, replay the optimistic user
  // message + thinking placeholder so switching back mid-request looks right.
  const p = pending.get(id);
  if (p) {
    add('user', '> ' + p.userMessage);
    add('bot', 'thinking...');
  }
  refreshThreads();
}

async function createThread(){
  const r = await authFetch('/chat/api/threads', {method: 'POST'});
  if (!r.ok) throw new Error('failed to create thread');
  const t = await r.json();
  return t.id;
}

newBtn.addEventListener('click', async () => {
  try {
    const id = await createThread();
    log.innerHTML = '';
    setActiveThread(id);
    await refreshThreads();
    input.focus();
  } catch (err) {
    add('err', String(err));
  }
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = input.value.trim();
  if (!msg) return;
  // Lock in the originating thread *now*. The user may switch away while the
  // request is pending; the response must land in (and only in) this thread.
  // If there's no active thread we mint one client-side (id + title) so the
  // sidebar row appears immediately, with no round-trip to POST /chat/api/threads.
  // The server upserts the thread on first sight inside /chat/api.
  let originId = threadId;
  const sendTitle = titleFromMessage(msg);
  let isNewOrigin = false;
  if (!originId) {
    originId = mintThreadId();
    optimistic.set(originId, {title: sendTitle, updated_at: Date.now() / 1000});
    setActiveThread(originId);
    isNewOrigin = true;
  }

  pending.set(originId, {userMessage: msg});
  input.value = '';
  // Render optimistically only if we're still looking at the origin thread.
  if (originId === threadId) {
    if (isNewOrigin) log.innerHTML = '';
    add('user', '> ' + msg);
    add('bot', 'thinking...');
  }
  syncSendButton();
  // Synchronous repaint using the cached server list overlaid with the
  // optimistic stub — the new row appears instantly. The background
  // refreshThreads() then reconciles with the actual server state once the
  // chat response (or any other change) has had a chance to land.
  renderThreads();
  refreshThreads();

  try {
    const r = await authFetch('/chat/stream', {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify({message: msg, thread_id: originId, title: sendTitle}),
    });
    pending.delete(originId);
    optimistic.delete(originId);
    if (!r.ok) {
      const t = await r.text();
      if (originId === threadId) {
        if (log.lastChild) log.lastChild.remove();
        add('err', 'HTTP ' + r.status + ': ' + t);
      }
      syncSendButton();
      refreshThreads();
      return;
    }

    // Remove "thinking..." placeholder; we'll render streaming events live
    if (originId === threadId && log.lastChild) log.lastChild.remove();

    let botEl = null; // current bot text element for streaming
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop(); // keep incomplete last line
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(6)); } catch { continue; }
        if (originId !== threadId) continue;

        if (evt.type === 'progress') {
          add('tool', '⋯ ' + evt.text);
        } else if (evt.type === 'tool_call') {
          botEl = null; // break text stream on tool call
          add('tool', '→ ' + evt.tool + '(' + JSON.stringify(evt.args) + ')');
        } else if (evt.type === 'tool_result') {
          botEl = null;
          add('tool', '← ' + evt.tool + (evt.isError ? ' ERROR' : '') + ': ' + evt.preview);
        } else if (evt.type === 'text_delta') {
          if (!botEl) { botEl = add('bot', ''); }
          botEl.textContent += evt.delta;
        } else if (evt.type === 'done') {
          // Final: replace streamed text with full output (handles edge cases)
          if (botEl) { botEl.textContent = evt.output; }
          else { add('bot', evt.output); }
          if (evt.available_tools?.length) {
            // Prepend tools line before the bot message
            const toolEl = document.createElement('div');
            toolEl.className = 'msg tool';
            toolEl.textContent = '🔧 tools: ' + evt.available_tools.join(', ');
            log.insertBefore(toolEl, botEl);
          }
        } else if (evt.type === 'error') {
          add('err', evt.message);
        }
      }
    }

    syncSendButton();
    refreshThreads();
  } catch (err) {
    pending.delete(originId);
    optimistic.delete(originId);
    if (originId === threadId) {
      if (log.lastChild) log.lastChild.remove();
      add('err', String(err));
    }
    syncSendButton();
    refreshThreads();
  } finally {
    if (originId === threadId) input.focus();
  }
});

(async () => {
  await refreshThreads();
  if (threadId) {
    const r = await authFetch('/chat/api/threads/' + threadId);
    if (r.ok) loadThread(threadId);
    else setActiveThread(null);
  }
})();
</script>
</div>
</body></html>
