<!doctype html>
<html><head><meta charset="utf-8"><title>Agent runs — litellm-bot</title>
<style>
  *{box-sizing:border-box}
  /* Page scrolls normally — no fixed-viewport flex contortions. The
     sidebar is position:fixed so it stays put while the main column
     scrolls; the right column inside main uses position:sticky so the
     trace follows you as you scroll the card/drilldown. This is the
     pattern GitHub PR pages use and it survives any viewport size,
     browser zoom, or content height without `min-height:0` voodoo. */
  html,body{margin:0;padding:0}
  body{font:14px/1.5 -apple-system,system-ui,sans-serif;color:#222;background:#fafafa;padding-left:380px}
  #sidebar{position:fixed;top:0;left:0;width:380px;height:100vh;border-right:1px solid #ddd;background:#f5f5f7;display:flex;flex-direction:column;z-index:5}
  #sidebar-head{padding:12px 14px;border-bottom:1px solid #e0e0e3;display:flex;flex-direction:column;gap:8px}
  #sidebar-head-top{display:flex;gap:8px;align-items:center}
  #sidebar-head h2{font-size:13px;margin:0;flex:1;color:#333}
  #nav-link{font-size:12px;color:#06c;text-decoration:none;padding:4px 8px;border:1px solid #ddd;border-radius:4px;background:#fff}
  #nav-link:hover{background:#eef}
  #backfill-row{display:flex;gap:6px;align-items:center}
  #backfill-limit{width:52px;padding:4px 6px;border:1px solid #ccc;border-radius:4px;font:inherit;font-size:12px;text-align:center}
  #backfill-btn{flex:1;padding:5px 10px;border:1px solid #ccc;border-radius:4px;background:#fff;font:inherit;font-size:12px;cursor:pointer;color:#444;white-space:nowrap}
  #backfill-btn:hover:not(:disabled){background:#f0f0f7}
  #backfill-btn:disabled{opacity:.5;cursor:wait}
  #backfill-status{font-size:11px;color:#888;min-height:14px}
  #filter-tabs{display:flex;gap:0;border-bottom:1px solid #e0e0e3;background:#f0f0f3}
  .filter-tab{flex:1;padding:7px 4px;border:0;background:transparent;font:inherit;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#888;cursor:pointer;border-bottom:2px solid transparent}
  .filter-tab:hover{color:#333;background:#e8e8eb}
  .filter-tab.active{color:#222;border-bottom-color:#222;background:#f5f5f7}
  #runs-list{flex:1;overflow-y:auto}
  .run-row{padding:10px 14px;border-bottom:1px solid #eee;cursor:pointer;display:flex;flex-direction:column;gap:4px}
  .run-row:hover{background:#eef}
  .run-row.active{background:#222;color:#fff}
  .run-row.active .run-meta{color:#bbb}
  .run-row.active .run-title{color:#fff}
  .run-top{display:flex;align-items:center;gap:6px}
  .badge{font-size:11px;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0}
  .badge-ready{background:#d4f4dd;color:#0a5}
  .badge-blocked{background:#fde0e0;color:#c00}
  .badge-waiting{background:#fff4d6;color:#a70}
  .run-row.active .badge{filter:brightness(1.05)}
  .scope-tag{font-size:10px;padding:1px 5px;border-radius:3px;background:#ddd;color:#555;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
  .scope-mock{background:#e8e0ff;color:#63a}
  .scope-slack{background:#e1f0ff;color:#06c}
  .scope-chat{background:#fff4d6;color:#a70}
  .scope-eval{background:#d4f4dd;color:#0a5}
  .label-tag{font-size:10px;padding:1px 5px;border-radius:3px;flex-shrink:0}
  .label-ready{background:#d4f4dd;color:#0a5}
  .label-not_ready{background:#fde0e0;color:#c00}
  .label-empty{background:#eee;color:#888}
  .run-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:500}
  .run-meta{font-size:11px;color:#888;display:flex;gap:8px}
  .run-liner{font-size:11.5px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
  .run-row.active .run-liner{color:#ccc}
  .date-group{padding:6px 14px 2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#aaa;background:#f0f0f3;border-bottom:1px solid #e8e8eb;position:sticky;top:0;z-index:2}
  .empty{color:#999;font-size:13px;text-align:center;padding:32px}
  /* Main column = the rest of the page beside the fixed sidebar. No
     overflow tricks; the document scrolls. */
  #main{min-height:100vh}
  #empty-detail{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#999;font-size:14px}
  #detail{display:block;width:100%}
  /* Header sticks to top of viewport while you scroll. */
  .detail-header{position:sticky;top:0;z-index:4;padding:18px 28px 12px;border-bottom:1px solid #e0e0e3;background:#fff}
  .detail-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;flex-wrap:wrap}
  .detail-head h1{font-size:18px;margin:0;flex:1;min-width:300px}
  .pr-link{font-size:12px;color:#06c;text-decoration:none}
  .pr-link:hover{text-decoration:underline}
  .detail-meta{color:#666;font-size:12px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .detail-meta a{color:#06c;text-decoration:none}
  .detail-meta a:hover{text-decoration:underline}
  .copy-btn{margin-left:auto;padding:5px 12px;border:1px solid #ccc;border-radius:4px;background:#fff;font:inherit;font-size:12px;cursor:pointer;color:#444;white-space:nowrap}
  .copy-btn:hover{background:#f0f0f7}
  .copy-btn.copied{background:#d4f4dd;border-color:#0a5;color:#0a5}
  .merge-btn{margin-left:6px;background:#fff8e6;border-color:#d4a600;color:#7a5c00}
  .merge-btn:hover:not(:disabled){background:#fff3cc}
  .merge-btn:disabled{opacity:.5;cursor:wait}
  .merge-btn.merging{background:#fff3cc;border-color:#d4a600}
  .merge-btn.merged{background:#d4f4dd;border-color:#0a5;color:#0a5}
  .merge-btn.merge-error{background:#fde0e0;border-color:#c33;color:#c00}
  .merge-branch-label{font-size:11px;color:#0a5;margin-left:6px}
  .json-section{background:#f6f6f9;border:1px solid #e0e0e3;border-radius:6px;margin-bottom:14px;overflow:hidden}
  .json-section summary{padding:10px 18px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#666;cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:8px}
  .json-section summary:hover{background:#eee}
  .json-section summary::before{content:'▶';font-size:10px;width:12px}
  details.json-section[open] summary::before{content:'▼'}
  .json-body{padding:0 18px 14px;max-height:500px;overflow-y:auto}
  .json-body pre{margin:0;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;white-space:pre-wrap;word-break:break-word;line-height:1.5;color:#222}
  /* Two-column body. Document-level scroll. The right column is
     position:sticky so the trace tracks the viewport while the left
     scrolls past it. */
  .detail-body{display:grid;grid-template-columns:minmax(0, 1fr) minmax(420px, 560px);align-items:start}
  @media (max-width: 1100px){
    .detail-body{grid-template-columns:1fr}
    .detail-right{border-left:0;border-top:1px solid #e0e0e3;position:static !important;max-height:none !important}
  }
  .detail-left{padding:20px 28px 40px;background:#fafafa;min-width:0}
  /* Sticky right column. Header is ~80px so we offset by that and
     constrain max-height so internal panes scroll, not the whole
     thing eating the viewport. */
  .detail-right{position:sticky;top:80px;display:flex;flex-direction:column;background:#fff;border-left:1px solid #e0e0e3;max-height:calc(100vh - 80px);overflow:hidden;min-width:0}
  .right-tabs{display:flex;border-bottom:1px solid #e0e0e3;background:#fafafa;flex-shrink:0}
  .right-tab{padding:10px 16px;border:0;background:transparent;font:inherit;font-size:12px;color:#666;cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.04em;font-weight:600;display:flex;align-items:center;gap:6px}
  .right-tab:hover{color:#222;background:#f0f0f7}
  .right-tab.active{color:#222;border-bottom-color:#222;background:#fff}
  .right-tab .count{font-size:10px;background:#ddd;color:#555;padding:1px 6px;border-radius:8px;font-weight:500;letter-spacing:0;text-transform:none}
  .right-tab.active .count{background:#222;color:#fff}
  .right-pane{flex:1;overflow-y:auto;padding:18px 22px 24px;min-height:0}
  .right-pane.hidden{display:none}
  .right-pane h3{display:flex;align-items:center;gap:8px}
  .right-tag{font-size:10px;padding:2px 6px;border-radius:3px;background:#e0e0e3;color:#555;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .section{background:#fff;border:1px solid #e0e0e3;border-radius:6px;padding:14px 18px;margin-bottom:14px}
  .detail-right .section{box-shadow:none;background:#fff}
  .section h3{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#666;font-weight:600}
  .card-text,.drilldown-text{white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;line-height:1.55;color:#222}
  /* --- Improved trace renderer --- */
  .trace-entry{margin:0 0 10px;border-radius:5px;overflow:hidden;border:1px solid #e0e0e3;font-family:ui-monospace,Menlo,monospace;font-size:11.5px}
  .trace-entry-call{border-left:3px solid #4a9}
  .trace-entry-result{border-left:3px solid #88a}
  .trace-entry-result.trace-error{border-left-color:#c33}
  .trace-header{display:flex;align-items:center;gap:8px;padding:5px 10px;background:#f5f5f7;border-bottom:1px solid #e8e8ea;user-select:none}
  .trace-tool-pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:1px 6px;border-radius:3px;background:#e0e0e3;color:#555}
  .trace-dir{font-size:10px;color:#888;letter-spacing:.04em}
  .trace-seq{margin-left:auto;font-size:10px;color:#bbb}
  .trace-cmd{margin:0;padding:8px 12px;background:#1e1e2e;color:#cdd6f4;white-space:pre-wrap;word-break:break-word;line-height:1.5;font-size:11px;max-height:200px;overflow-y:auto}
  .trace-out-text{margin:0;padding:8px 12px;background:#f9f9fb;color:#333;white-space:pre-wrap;word-break:break-word;line-height:1.5;max-height:200px;overflow-y:auto}
  .trace-error .trace-out-text{background:#fff5f5;color:#900}
  .trace-truncated{padding:3px 12px 5px;font-size:10.5px;color:#a60;background:#fffbe6;border-top:1px solid #f0e0a0}
  .trace-err-badge{padding:3px 12px;font-size:10.5px;color:#900;background:#fff0f0;border-bottom:1px solid #fcc}
  /* --- Data quality flags --- */
  .dq-flags{margin-bottom:14px}
  .dq-flag{display:flex;align-items:flex-start;gap:8px;padding:7px 12px;border-radius:4px;font-size:12px;line-height:1.4;margin-bottom:6px}
  .dq-warn{background:#fffbe6;border:1px solid #f0d060;color:#6b4f00}
  .dq-info{background:#e8f4ff;border:1px solid #a0c8f0;color:#004080}
  .dq-icon{font-size:13px;flex-shrink:0;margin-top:1px}
  /* Full-trace renderer (one block per pydantic_ai message part). Each part
     gets a kind-tinted border so the eye can scan a long trace fast. */
  .trace-controls{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .arm-tabs{display:flex;gap:6px}
  .arm-tab{padding:5px 12px;border:1px solid #ccc;background:#fff;border-radius:4px;font:inherit;font-size:12px;cursor:pointer;color:#444}
  .arm-tab.active{background:#222;color:#fff;border-color:#222}
  .arm-tab:disabled{opacity:.4;cursor:not-allowed}
  .trace-toggle-all{margin-left:auto;font:inherit;font-size:11px;color:#06c;background:transparent;border:1px solid #ccc;border-radius:4px;padding:4px 10px;cursor:pointer}
  .trace-toggle-all:hover{background:#f0f0f7}
  .part{border-left:3px solid #ccc;background:#fff;border:1px solid #e8e8ea;border-left-width:3px;border-radius:4px;margin:8px 0;font-size:12px}
  .part-system{border-left-color:#a89}
  .part-user{border-left-color:#5a8}
  .part-text{border-left-color:#aaa}
  .part-tool-call{border-left-color:#5b8}
  .part-tool-return{border-left-color:#88a}
  .part-retry-prompt{border-left-color:#c80}
  .part-head{padding:6px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;background:#fafafa;border-bottom:1px solid #eee}
  .part-head:hover{background:#f0f0f7}
  .part-kind{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.05em}
  .part-name{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:#222}
  .part-bytes{margin-left:auto;font-size:10.5px;color:#888;font-family:ui-monospace,Menlo,monospace}
  .part-toggle{font-size:11px;color:#888;width:14px;text-align:center}
  .part-body{padding:10px 12px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;white-space:pre-wrap;word-break:break-word;background:#fff;line-height:1.5;max-height:600px;overflow-y:auto}
  .part-body.collapsed{display:none}
  .part-body pre{margin:0;font:inherit}
  .trace-empty{color:#888;font-size:12px;font-style:italic;padding:10px 4px}
  .label-form label{display:block;font-size:12px;color:#444;margin:8px 0 4px}
  .label-form select,.label-form textarea{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;font:inherit;font-size:13px}
  .label-form textarea{min-height:80px;resize:vertical}
  .label-buttons{display:flex;gap:8px;margin-top:12px;align-items:center}
  .label-buttons button{padding:8px 14px;border:0;border-radius:4px;background:#222;color:#fff;cursor:pointer;font:inherit;font-size:13px}
  .label-buttons button.secondary{background:#fff;color:#444;border:1px solid #ccc}
  .label-buttons button.danger{background:#c33;color:#fff}
  .label-buttons button:disabled{opacity:.5;cursor:wait}
  .label-buttons .status{font-size:12px;color:#888}
  .err{color:#c00;font-size:12px;margin-top:6px}
  .ok{color:#0a5;font-size:12px;margin-top:6px}
  #view-tabs{display:flex;border-bottom:1px solid #e0e0e3;background:#eaeaed}
  .view-tab{flex:1;padding:7px 4px;border:0;background:transparent;font:inherit;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#888;cursor:pointer;border-bottom:2px solid transparent}
  .view-tab:hover{color:#333;background:#e0e0e4}
  .view-tab.active{color:#222;border-bottom-color:#222;background:#f5f5f7}
  #staging-prs-list{flex:1;overflow-y:auto;display:none}
  .staging-row{padding:10px 14px;border-bottom:1px solid #eee;display:flex;flex-direction:column;gap:3px;text-decoration:none;color:inherit}
  .staging-row:hover{background:#eef}
  .staging-row-top{display:flex;align-items:center;gap:6px}
  .staging-pr-num{font-size:11px;font-weight:700;color:#555;flex-shrink:0}
  .staging-pr-title{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .staging-pr-branch{font-size:10px;font-family:ui-monospace,Menlo,monospace;color:#0a5;background:#d4f4dd;padding:1px 5px;border-radius:3px;flex-shrink:0}
  .staging-pr-meta{font-size:11px;color:#888}
  .staging-pr-base{font-size:10px;color:#888}
  #staging-refresh-btn{padding:4px 10px;border:1px solid #ccc;border-radius:4px;background:#fff;font:inherit;font-size:11px;cursor:pointer;color:#444;flex-shrink:0}
  #staging-refresh-btn:hover{background:#f0f0f7}
  #staging-status{font-size:11px;color:#888;min-height:14px}
  #auto-merged-list{flex:1;overflow-y:auto;display:none}
  .auto-merged-row{padding:10px 14px;border-bottom:1px solid #eee;display:flex;flex-direction:column;gap:3px}
  .auto-merged-row:hover{background:#eef}
  .auto-merged-badge{font-size:10px;padding:1px 5px;border-radius:3px;background:#d4f4dd;color:#0a5;font-weight:600;flex-shrink:0}
</style></head>
<body>
<aside id="sidebar">
  <div id="sidebar-head">
    <div id="sidebar-head-top">
      <h2 id="sidebar-title">Agent runs</h2>
      <a id="nav-link" href="/chat">Chat →</a>
    </div>
    <div id="backfill-row">
      <input id="backfill-limit" type="number" min="1" max="100" value="20" title="Number of PRs">
      <button id="backfill-btn" type="button">▶ Run last N open PRs</button>
    </div>
    <div id="backfill-status"></div>
    <div id="staging-controls" style="display:none;flex-direction:column;gap:4px">
      <div style="display:flex;gap:6px;align-items:center">
        <button id="staging-refresh-btn" type="button">↺ Refresh</button>
        <span id="staging-status"></span>
      </div>
    </div>
  </div>
  <div id="view-tabs">
    <button class="view-tab active" data-view="runs" type="button">Runs</button>
    <button class="view-tab" data-view="staging-prs" type="button">Staging PRs</button>
    <button class="view-tab" data-view="auto-merged" type="button">Auto-merged</button>
    <button class="view-tab" data-view="agent" type="button">Agent</button>
  </div>
  <div id="filter-tabs">
    <button class="filter-tab active" data-filter="all" type="button">All</button>
    <button class="filter-tab" data-filter="ready" type="button">✓ Ready</button>
    <button class="filter-tab" data-filter="blocked" type="button">✗ Blocked</button>
  </div>
  <div id="runs-list"><div class="empty">Loading…</div></div>
  <div id="staging-prs-list"><div class="empty">Loading…</div></div>
  <div id="auto-merged-list"><div class="empty">Loading…</div></div>
  <div id="agent-panel" style="display:none;flex:1;overflow-y:auto"><div class="empty">Loading…</div></div>
</aside>
<main id="main">
  <div id="empty-detail">Select a run on the left.</div>
  <div id="detail" style="display:none"></div>
</main>
<script>
const runsListEl = document.getElementById('runs-list');
const detailEl = document.getElementById('detail');
const emptyDetailEl = document.getElementById('empty-detail');
let activeRunId = null;
let runs = [];
let activeFilter = 'all';

function filteredRuns(){
  if (activeFilter === 'ready') return runs.filter(r => (r.verdict || '').toUpperCase() === 'READY');
  if (activeFilter === 'blocked') return runs.filter(r => (r.verdict || '').toUpperCase() !== 'READY');
  return runs;
}

async function authFetch(url, opts){
  const r = await fetch(url, opts);
  if (r.status === 401) { window.location.href = '/login'; throw new Error('redirecting to login'); }
  return r;
}

function fmtTime(ts){
  const d = new Date(ts * 1000);
  return d.toLocaleString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}

function fmtCost(c){ return c == null ? '' : '$' + c.toFixed(3); }
function fmtDuration(s){ return s == null ? '' : s.toFixed(1) + 's'; }

function verdictBadgeClass(v){
  return 'badge badge-' + (v || 'blocked').toLowerCase();
}

function dateGroupLabel(ts){
  const d = new Date(ts * 1000);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today - 86400000);
  const runDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (runDay >= today) return 'Today';
  if (runDay >= yesterday) return 'Yesterday';
  return d.toLocaleDateString(undefined, {weekday:'long', month:'short', day:'numeric'});
}

function renderRunsList(){
  runsListEl.innerHTML = '';
  const visible = filteredRuns();
  if (!visible.length) {
    runsListEl.innerHTML = runs.length
      ? '<div class="empty">No ' + activeFilter + ' runs.</div>'
      : '<div class="empty">No runs yet. They\'ll appear here as the agent reviews PRs.</div>';
    return;
  }
  let lastGroup = null;
  for (const r of visible) {
    const group = dateGroupLabel(r.ts);
    if (group !== lastGroup) {
      const hdr = document.createElement('div');
      hdr.className = 'date-group';
      hdr.textContent = group;
      runsListEl.appendChild(hdr);
      lastGroup = group;
    }
    const row = document.createElement('div');
    row.className = 'run-row' + (r.run_id === activeRunId ? ' active' : '');
    row.dataset.id = r.run_id;
    const top = document.createElement('div');
    top.className = 'run-top';
    const badge = document.createElement('span');
    badge.className = verdictBadgeClass(r.verdict);
    badge.textContent = r.emoji + ' ' + r.score + '/5';
    const scope = document.createElement('span');
    scope.className = 'scope-tag scope-' + r.source;
    scope.textContent = r.source;
    const labelTag = document.createElement('span');
    labelTag.className = 'label-tag label-' + (r.human_label || 'empty');
    labelTag.textContent = r.human_label || 'unlabeled';
    top.appendChild(badge);
    top.appendChild(scope);
    top.appendChild(labelTag);
    const title = document.createElement('div');
    title.className = 'run-title';
    // pr_title sometimes echoes the URL when triage couldn't extract a title
    const displayTitle = (r.pr_title && !r.pr_title.startsWith('http'))
      ? '#' + r.pr_number + ' ' + r.pr_title
      : '#' + r.pr_number;
    title.textContent = displayTitle;
    const liner = document.createElement('div');
    liner.className = 'run-liner';
    liner.textContent = r.verdict_one_liner || '';
    const meta = document.createElement('div');
    meta.className = 'run-meta';
    const parts = [];
    if (r.pr_author) parts.push(r.pr_author);
    parts.push(new Date(r.ts * 1000).toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit'}));
    if (r.duration_s != null) parts.push(fmtDuration(r.duration_s));
    meta.textContent = parts.join(' · ');
    row.appendChild(top);
    row.appendChild(title);
    if (r.verdict_one_liner) row.appendChild(liner);
    row.appendChild(meta);
    row.addEventListener('click', () => loadDetail(r.run_id));
    runsListEl.appendChild(row);
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function unwrapPreview(preview){
  if (!preview) return { text: '' };
  // Try to extract text field from JSON.stringify({"content":[{"type":"text","text":"..."}]})
  const full = preview.match(/"text":"((?:[^"\\]|\\.)*)"/);
  if (full) {
    let text;
    try { text = JSON.parse('"' + full[1] + '"'); }
    catch { text = full[1].replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\"/g,'"').replace(/\\\\/g,'\\'); }
    return { text };
  }
  return { text: preview };
}

function renderTrace(trace){
  if (!trace || !trace.length) return '<em style="color:#999">No tool calls recorded.</em>';
  return trace.map((t, i) => {
    if (t.kind === 'call') {
      const cmd = (t.args && t.args.command) ? t.args.command : JSON.stringify(t.args || {}, null, 2);
      return `<div class="trace-entry trace-entry-call">
        <div class="trace-header">
          <span class="trace-tool-pill">${escapeHtml(t.tool)}</span>
          <span class="trace-dir">→ call</span>
          <span class="trace-seq">#${i+1}</span>
        </div>
        <pre class="trace-cmd">${escapeHtml(cmd)}</pre>
      </div>`;
    } else {
      const { text } = unwrapPreview(t.preview || '');
      const errClass = t.isError ? ' trace-error' : '';
      return `<div class="trace-entry trace-entry-result${errClass}">
        <div class="trace-header">
          <span class="trace-tool-pill">${escapeHtml(t.tool || 'result')}</span>
          <span class="trace-dir">← result</span>
          <span class="trace-seq">#${i+1}</span>
        </div>
        ${t.isError ? '<div class="trace-err-badge">⚠ error</div>' : ''}
        <pre class="trace-out-text">${escapeHtml(text)}</pre>
      </div>`;
    }
  }).join('');
}

function buildDataQualityFlags(rec){
  const flags = [];
  const triage = rec.triage || {};
  const trace = rec.tool_trace || [];
  const previewText = trace.filter(t => t.kind === 'result').map(t => (t.preview || '').toLowerCase()).join(' ');

  if ((triage.greptile_score === null || triage.greptile_score === undefined) && previewText.includes('greptile')) {
    flags.push({ level:'warn', msg:'greptile_score=null but greptile content visible in tool trace — agent likely saw the comment but failed to extract a numeric score (look for "Confidence Score: X/5" format in the result previews below)' });
  }
  const summary = triage.pr_summary || '';
  if (/^(I'(ll|m)|I will|Let me|I'll start|I need to)/i.test(summary)) {
    flags.push({ level:'warn', msg:'pr_summary contains agent reasoning prose instead of a clean description — JSON extraction succeeded but pr_summary field was populated with the agent\'s internal monologue' });
  }
  const title = triage.pr_title || '';
  if (title.startsWith('http')) {
    flags.push({ level:'warn', msg:'pr_title echoes the URL — agent failed to extract the real PR title from the GitHub API response' });
  }
  if (!triage.pr_author) {
    flags.push({ level:'info', msg:'pr_author is empty — GitHub API may have returned an unexpected shape or the field was missed during extraction' });
  }
  if (triage.files_changed === 0 && previewText.includes('modified')) {
    flags.push({ level:'info', msg:'files_changed=0 but tool trace shows file modifications — this field is always overwritten server-side (known behavior)' });
  }
  return flags;
}

function renderDataQualityFlags(flags){
  if (!flags.length) return '';
  return '<div class="dq-flags">' + flags.map(f => {
    const icon = f.level === 'warn' ? '⚠' : 'ℹ';
    return `<div class="dq-flag dq-${f.level}"><span class="dq-icon">${icon}</span><span>${escapeHtml(f.msg)}</span></div>`;
  }).join('') + '</div>';
}

// --- Full pydantic_ai message renderer ---------------------------------------
// Same shape Logfire receives via `pydantic_ai.all_messages`. Each pydantic_ai
// `ModelMessage` is `{kind: "request"|"response", parts: [...]}` — we flatten
// and render one collapsible block per part. The shape comes verbatim from
// `ModelMessagesTypeAdapter.dump_python(..., mode='json')` so the renderer
// stays valid as long as pydantic_ai's schema does.

function fmtBytes(n){
  if (n < 1024) return n + 'B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + 'KB';
  return (n/1024/1024).toFixed(2) + 'MB';
}

function prettyJson(value){
  // Tool args sometimes come in as a JSON-string (the pydantic_ai schema
  // permits both `dict` and `str` for ToolCallPart.args). Try to parse so
  // the tree displays nested keys instead of one giant escaped line.
  if (typeof value === 'string') {
    const trimmed = value.trim();
    if ((trimmed.startsWith('{') && trimmed.endsWith('}')) ||
        (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
      try { return JSON.stringify(JSON.parse(trimmed), null, 2); }
      catch (e) { /* fall through */ }
    }
    return value;
  }
  return JSON.stringify(value, null, 2);
}

function renderPart(part, idx, armId){
  const kind = part.part_kind || part.kind || 'unknown';
  let label = '';
  let body = '';
  // Coarse-grained dispatch on `part_kind`. Anything we don't recognize
  // falls through to the JSON-dump branch below — keeps the renderer
  // compatible with future pydantic_ai part types without code changes.
  if (kind === 'system-prompt') {
    label = 'system';
    body = part.content || '';
  } else if (kind === 'user-prompt') {
    label = 'user';
    body = typeof part.content === 'string' ? part.content : prettyJson(part.content);
  } else if (kind === 'tool-call') {
    label = 'tool_call · ' + (part.tool_name || '?');
    body = prettyJson(part.args);
  } else if (kind === 'tool-return') {
    label = 'tool_return · ' + (part.tool_name || '?');
    body = prettyJson(part.content);
  } else if (kind === 'retry-prompt') {
    label = 'retry · ' + (part.tool_name || '');
    body = prettyJson(part.content);
  } else if (kind === 'text') {
    label = 'assistant text';
    body = part.content || '';
  } else {
    label = kind;
    body = prettyJson(part);
  }
  const bytes = body ? body.length : 0;
  const cls = 'part part-' + kind;
  // Every part collapsed by default. Use the "Expand all" button or
  // click a header to drill in. Old behavior (everything expanded
  // except system-prompt) overflowed the column on long tool returns.
  return (
    '<div class="' + cls + '">' +
      '<div class="part-head" data-arm="' + armId + '" data-idx="' + idx + '">' +
        '<span class="part-toggle">▶</span>' +
        '<span class="part-kind">' + escapeHtml(kind) + '</span>' +
        '<span class="part-name">' + escapeHtml(label) + '</span>' +
        '<span class="part-bytes">' + fmtBytes(bytes) + '</span>' +
      '</div>' +
      '<div class="part-body collapsed"><pre>' + escapeHtml(body) + '</pre></div>' +
    '</div>'
  );
}

function renderArm(messages, armId){
  if (!messages || !messages.length) {
    return '<div class="trace-empty">No messages captured for this arm. (Pre-' +
           'instrumentation record, or the agent didn\'t run for this arm.)</div>';
  }
  // Flatten pydantic_ai `ModelMessage[].parts[]` into one ordered list of parts.
  const flat = [];
  for (const msg of messages) {
    for (const part of (msg.parts || [])) {
      flat.push(part);
    }
  }
  return flat.map((p, i) => renderPart(p, i, armId)).join('');
}

// Wire up the part-head click handler once at module scope. We use event
// delegation so freshly-rendered parts (after switching arms) still toggle
// without re-binding.
document.addEventListener('click', (e) => {
  const head = e.target.closest && e.target.closest('.part-head');
  if (!head) return;
  const body = head.nextElementSibling;
  if (!body) return;
  body.classList.toggle('collapsed');
  const toggle = head.querySelector('.part-toggle');
  if (toggle) toggle.textContent = body.classList.contains('collapsed') ? '▶' : '▼';
});

let activeArm = 'triage';

function switchArm(arm, rec){
  activeArm = arm;
  const messages = (rec.messages && rec.messages[arm]) || [];
  const armBox = document.getElementById('arm-body');
  if (armBox) armBox.innerHTML = renderArm(messages, arm);
  for (const btn of document.querySelectorAll('.arm-tab')) {
    btn.classList.toggle('active', btn.dataset.arm === arm);
  }
}

function buildDebugDump(rec){
  const card = rec.card || {};
  const lines = [];
  lines.push('=== RUN DEBUG DUMP ===');
  lines.push('PR:       ' + rec.pr_url);
  lines.push('Title:    #' + rec.pr_number + ' ' + (rec.pr_title || ''));
  lines.push('Author:   ' + (rec.pr_author || ''));
  lines.push('Reviewed: ' + fmtTime(rec.ts));
  lines.push('Duration: ' + fmtDuration(rec.duration_s));
  lines.push('Source:   ' + (rec.source || ''));
  lines.push('LiteLLM session_id: ' + rec.run_id);
  lines.push('');
  lines.push('=== VERDICT ===');
  lines.push((card.emoji || '') + ' ' + card.score + '/5 ' + (card.verdict || ''));
  if (card.verdict_one_liner) lines.push(card.verdict_one_liner);
  if (card.justification) lines.push(card.justification);
  lines.push('');
  lines.push('=== CARD TEXT ===');
  lines.push(renderCardText(card));
  lines.push('');
  lines.push('=== DRILLDOWN ===');
  lines.push(renderDrilldownText(rec));
  lines.push('');
  lines.push('=== TRIAGE REPORT (structured JSON) ===');
  lines.push(JSON.stringify(rec.triage || {}, null, 2));
  lines.push('');
  lines.push('=== PATTERN REPORT (structured JSON) ===');
  lines.push(JSON.stringify(rec.pattern || {}, null, 2));
  lines.push('');
  if (rec.karpathy_check && Object.keys(rec.karpathy_check).length) {
    lines.push('=== KARPATHY CHECK (structured JSON) ===');
    lines.push(JSON.stringify(rec.karpathy_check, null, 2));
    lines.push('');
  }
  lines.push('=== TOOL TRACE ===');
  const trace = rec.tool_trace || [];
  if (!trace.length) {
    lines.push('(none)');
  } else {
    for (const t of trace) {
      if (t.kind === 'call') {
        lines.push('→ ' + t.tool + '(' + JSON.stringify(t.args) + ')');
      } else {
        lines.push('← ' + t.tool + ' returned: ' + (t.preview || ''));
      }
    }
  }
  return lines.join('\n');
}

async function copyDebugDump(rec){
  const btn = document.getElementById('copy-dump-btn');
  const text = buildDebugDump(rec);
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy debug dump'; btn.classList.remove('copied'); }, 2000);
  } catch {
    // fallback: select a textarea
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy debug dump'; btn.classList.remove('copied'); }, 2000);
  }
}

function logfireLink(rec){
  if (!rec.logfire_trace_id) return '';
  // Generic Logfire trace deep-link. Self-host users can set their own
  // base via window.__LOGFIRE_BASE__ if they ever wire it through; the
  // default "#" anchor is a safe no-op for the demo.
  const base = window.__LOGFIRE_BASE__ || '#';
  return ' · <a href="' + base + 'traces/' + rec.logfire_trace_id + '" target="_blank">Logfire trace ↗</a>';
}

function renderDetail(rec){
  emptyDetailEl.style.display = 'none';
  detailEl.style.display = 'block';
  const card = rec.card || {};
  const drilldown = renderDrilldownText(rec);

  const tokenLine = (rec.tokens_in || rec.tokens_out)
    ? ' · ' + (rec.tokens_in || 0).toLocaleString() + ' in / ' + (rec.tokens_out || 0).toLocaleString() + ' out'
    : '';

  const triageMsgs = (rec.messages && rec.messages.triage) || [];
  const patternMsgs = (rec.messages && rec.messages.pattern) || [];

  // Stripe-style layout: full-width header on top, two columns below.
  // Left  = human-facing summary (card, drilldown, tool-trace skim).
  // Right = tabbed: "Trace" (raw pydantic_ai messages, expandable) and
  //         "Annotation" (label form + history). Tabs let the grader
  //         toggle between reading what the agent did and recording
  //         their judgment without scrolling between sections.
  const labelTagText = rec.human_label || 'unlabeled';
  detailEl.innerHTML = `
    <div class="detail-header">
      <div class="detail-head">
        <h1>#${rec.pr_number} ${escapeHtml(rec.pr_title)}</h1>
        <span class="${verdictBadgeClass(card.verdict)}">${card.emoji || ''} ${card.score}/5 ${card.verdict || ''}</span>
      </div>
      <div class="detail-meta">
        <span>by ${escapeHtml(rec.pr_author)}</span>
        <a href="${escapeHtml(rec.pr_url)}" target="_blank" class="pr-link">View on GitHub ↗</a>
        <span>${fmtTime(rec.ts)} · ${fmtDuration(rec.duration_s)} · ${fmtCost(rec.cost_usd)}${tokenLine}</span>
        <span>${escapeHtml(rec.model_name || '')}${logfireLink(rec)}</span>
        <button id="copy-dump-btn" class="copy-btn" type="button">Copy debug dump</button>
        <button id="merge-btn" class="copy-btn merge-btn" type="button">Merge to staging ↗</button>
        <span id="merge-branch-label" class="merge-branch-label"></span>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-left">
        <div class="section">
          <h3>Card (what posted to Slack)</h3>
          <div class="card-text">${escapeHtml(renderCardText(card))}</div>
        </div>
        <div class="section">
          <h3>Drill-down</h3>
          <div class="drilldown-text">${escapeHtml(drilldown)}</div>
        </div>
        ${renderDataQualityFlags(buildDataQualityFlags(rec))}
        <details class="json-section">
          <summary>Triage report (full JSON)</summary>
          <div class="json-body"><pre>${escapeHtml(JSON.stringify(rec.triage || {}, null, 2))}</pre></div>
        </details>
        ${(rec.pattern && (rec.pattern.findings || []).length) ? `
        <details class="json-section">
          <summary>Pattern report (full JSON)</summary>
          <div class="json-body"><pre>${escapeHtml(JSON.stringify(rec.pattern, null, 2))}</pre></div>
        </details>` : ''}
        ${(rec.karpathy_check && Object.keys(rec.karpathy_check).length) ? `
        <details class="json-section">
          <summary>Karpathy check (full JSON)</summary>
          <div class="json-body"><pre>${escapeHtml(JSON.stringify(rec.karpathy_check, null, 2))}</pre></div>
        </details>` : ''}
        <div class="section">
          <h3>Tool trace (skim)</h3>
          ${renderTrace(rec.tool_trace)}
        </div>
      </div>
      <div class="detail-right">
        <div class="right-tabs">
          <button class="right-tab active" data-rtab="trace" type="button">
            <span class="right-tag">Raw</span>Trace
          </button>
          <button class="right-tab" data-rtab="annotation" type="button">
            Annotation
            <span class="count label-${rec.human_label || 'empty'}">${escapeHtml(labelTagText)}</span>
          </button>
        </div>
        <div class="right-pane" data-pane="trace">
          <div class="trace-controls">
            <div class="arm-tabs">
              <button class="arm-tab active" data-arm="triage" type="button">Triage (${triageMsgs.length} msgs)</button>
              <button class="arm-tab" data-arm="pattern" type="button" ${patternMsgs.length === 0 ? 'disabled' : ''}>Pattern (${patternMsgs.length} msgs)</button>
            </div>
            <button class="trace-toggle-all" id="toggle-all-btn" type="button">Expand all</button>
          </div>
          <div id="arm-body">${renderArm(triageMsgs, 'triage')}</div>
        </div>
        <div class="right-pane hidden" data-pane="annotation">
          <div class="section label-form">
            <h3>Your verdict</h3>
            <label for="lbl">Label</label>
            <select id="lbl">
              <option value="">— unlabeled —</option>
              <option value="ready"${rec.human_label === 'ready' ? ' selected' : ''}>ready (agent was right if it said READY)</option>
              <option value="not_ready"${rec.human_label === 'not_ready' ? ' selected' : ''}>not_ready (PR is not ready for human review)</option>
            </select>
            <label for="notes">Notes (what would you have said? where does the agent disagree?)</label>
            <textarea id="notes" placeholder="e.g. Agreed with READY but reviewer should call out the perf cost in line 42.">${escapeHtml(rec.human_notes || '')}</textarea>
            <div class="label-buttons">
              <button id="save-btn">Save label</button>
              <button id="graduate-btn" class="secondary" title="Promote to eval_prs(set_name='graduated')">Graduate to eval set →</button>
              <span id="status" class="status"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('copy-dump-btn').addEventListener('click', () => copyDebugDump(rec));
  document.getElementById('merge-btn').addEventListener('click', () => mergePrToStagingBranch(rec.pr_number, rec.pr_url));
  document.getElementById('save-btn').addEventListener('click', () => saveLabel(rec.run_id));
  document.getElementById('graduate-btn').addEventListener('click', () => graduate(rec.run_id));
  for (const btn of document.querySelectorAll('.arm-tab')) {
    btn.addEventListener('click', () => switchArm(btn.dataset.arm, rec));
  }
  for (const btn of document.querySelectorAll('.right-tab')) {
    btn.addEventListener('click', () => switchRightTab(btn.dataset.rtab));
  }
  document.getElementById('toggle-all-btn').addEventListener('click', toggleAllParts);
  activeArm = 'triage';
}

// Toggle every part-body in the active arm. Tracks state on the button
// label so the next click flips. Only touches the currently-rendered
// arm — switching arms re-renders fresh (collapsed) parts anyway.
function toggleAllParts(){
  const btn = document.getElementById('toggle-all-btn');
  const expand = btn.textContent.startsWith('Expand');
  const bodies = document.querySelectorAll('#arm-body .part-body');
  for (const body of bodies) {
    body.classList.toggle('collapsed', !expand);
    const toggle = body.previousElementSibling && body.previousElementSibling.querySelector('.part-toggle');
    if (toggle) toggle.textContent = expand ? '▼' : '▶';
  }
  btn.textContent = expand ? 'Collapse all' : 'Expand all';
}

function switchRightTab(name){
  for (const btn of document.querySelectorAll('.right-tab')) {
    btn.classList.toggle('active', btn.dataset.rtab === name);
  }
  for (const pane of document.querySelectorAll('.right-pane')) {
    pane.classList.toggle('hidden', pane.dataset.pane !== name);
  }
}

function renderCardText(card){
  // Mirror render_card() server-side. Keeping this deterministic in JS
  // avoids a round-trip just to render preformatted text.
  const size = card.size_line ? '_' + card.size_line + '_\n\n' : '';
  const failing = card.failing_line ? card.failing_line + '\n' : '';
  return '*Triage Summary*\n' + (card.summary || '') + '\n\n' +
    size +
    '*Merge Confidence: ' + card.score + '/5*  ' + (card.emoji || '') + ' ' + (card.verdict || '') + '\n' +
    failing +
    (card.verdict_one_liner || '') + '\n\n' +
    (card.justification || '');
}

function renderDrilldownText(rec){
  // Mirror render_drilldown(). Best-effort — used as a quick visual; the
  // canonical drilldown is what posted to Slack.
  const t = rec.triage || {};
  const p = rec.pattern || {};
  const lines = ['*Drill-down*'];
  if (t.has_merge_conflicts === true) {
    lines.push('\n_Merge state_');
    lines.push('  • merge conflicts — branch must be rebased before it can merge');
  }
  const r = t.failure_rationales || {};
  function bullets(label, names){
    if (!names || !names.length) return;
    lines.push('\n_' + label + '_');
    for (const n of names) {
      const why = r[n] || '';
      lines.push('  • ' + n + (why ? ' — ' + why : ''));
    }
  }
  bullets('PR-related failures', t.pr_related_failures);
  bullets('Unrelated failures', t.unrelated_failures);
  bullets('Policy / meta failures (zero-penalty)', t.policy_meta_failures);
  bullets('Still running', t.running_checks);
  if (p.findings && p.findings.length) {
    lines.push('\n_Pattern findings_');
    for (const f of p.findings) {
      const risk = f.risk && f.risk !== 'low' ? ' risk=' + f.risk : '';
      lines.push('  • [' + f.severity + risk + '] `' + f.file + '` — ' + f.rationale + ' (source: ' + f.source + ', ' + f.citation + ')');
    }
  }
  if (p.tech_debt && p.tech_debt.length) {
    lines.push('\n_Tech debt (FYI, not blocking)_');
    for (const td of p.tech_debt) {
      lines.push('  • `' + td.code_path + '` vs `' + td.doc_path + '` — ' + td.note);
    }
  }
  if (lines.length === 1) lines.push('Nothing to drill into. Card has the full story.');
  return lines.join('\n');
}

async function mergePrToStagingBranch(prNumber, prUrl){
  const btn = document.getElementById('merge-btn');
  const branchLabel = document.getElementById('merge-branch-label');
  const match = prUrl.match(/github\.com\/([^/]+\/[^/]+)\/pull\/(\d+)/);
  if (!match) { alert('Could not parse repo from PR URL: ' + prUrl); return; }
  const repo = match[1];
  btn.disabled = true;
  btn.textContent = 'Merging…';
  btn.className = 'copy-btn merge-btn merging';
  branchLabel.textContent = '';
  try {
    const r = await authFetch(`/api/v1/prs/${prNumber}/merge-to-agent-branch?repo=${encodeURIComponent(repo)}`, { method: 'POST' });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'HTTP ' + r.status);
    btn.textContent = 'Merged ✓';
    btn.className = 'copy-btn merge-btn merged';
    branchLabel.innerHTML = '→ <a href="' + data.staging_pr_url + '" target="_blank" style="color:#0a5">PR #' + data.staging_pr_number + ' ↗</a> (' + data.branch + ')';
  } catch (err) {
    btn.textContent = 'Merge failed ✗';
    btn.className = 'copy-btn merge-btn merge-error';
    branchLabel.textContent = String(err);
    branchLabel.style.color = '#c00';
  } finally {
    btn.disabled = false;
  }
}

async function loadDetail(runId){
  activeRunId = runId;
  history.replaceState(null, '', '/runs#' + runId);
  renderRunsList();
  try {
    const r = await authFetch('/runs/api/runs/' + runId);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const rec = await r.json();
    renderDetail(rec);
  } catch (err) {
    detailEl.style.display = 'block';
    emptyDetailEl.style.display = 'none';
    detailEl.innerHTML = '<div class="err">Failed to load: ' + escapeHtml(String(err)) + '</div>';
  }
}

async function saveLabel(runId){
  const status = document.getElementById('status');
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  status.className = 'status';
  status.textContent = 'Saving…';
  const lbl = document.getElementById('lbl').value || null;
  const notes = document.getElementById('notes').value || null;
  try {
    const r = await authFetch('/runs/api/runs/' + runId + '/label', {
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({human_label: lbl, human_notes: notes}),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + (await r.text()));
    await refresh();
    status.className = 'status ok';
    status.textContent = 'Saved.';
  } catch (err) {
    status.className = 'status err';
    status.textContent = String(err);
  } finally {
    btn.disabled = false;
  }
}

async function graduate(runId){
  const status = document.getElementById('status');
  const btn = document.getElementById('graduate-btn');
  status.className = 'status';
  status.textContent = '';
  if (!confirm('Append this PR to tests/eval/pr_set_v3.json so the next eval run grades against it?')) return;
  btn.disabled = true;
  status.textContent = 'Graduating…';
  try {
    const r = await authFetch('/runs/api/runs/' + runId + '/graduate', {method:'POST'});
    if (!r.ok) {
      const t = await r.text();
      throw new Error('HTTP ' + r.status + ': ' + t);
    }
    const data = await r.json();
    status.className = 'status ok';
    status.textContent = 'Added. pr_set_v3.json now has ' + data.total_prs + ' PR(s).';
  } catch (err) {
    status.className = 'status err';
    status.textContent = String(err);
  } finally {
    btn.disabled = false;
  }
}

async function refresh(){
  const r = await authFetch('/runs/api/runs');
  runs = await r.json();
  renderRunsList();
}

(async () => {
  await refresh();
  const hash = window.location.hash.replace(/^#/, '');
  if (hash && runs.find(r => r.run_id === hash)) {
    loadDetail(hash);
  } else if (runs.length) {
    loadDetail(runs[0].run_id);
  }
})();

// --- View tabs (Runs / Staging PRs) ------------------------------------------

let activeView = 'runs';

function setView(view) {
  activeView = view;
  const isRuns = view === 'runs';
  const isAgent = view === 'agent';
  const isStagingPrs = view === 'staging-prs';
  const isAutoMerged = view === 'auto-merged';
  document.getElementById('filter-tabs').style.display = isRuns ? '' : 'none';
  document.getElementById('backfill-row').style.display = isRuns ? '' : 'none';
  document.getElementById('backfill-status').style.display = isRuns ? '' : 'none';
  document.getElementById('staging-controls').style.display = isStagingPrs ? 'flex' : 'none';
  document.getElementById('runs-list').style.display = isRuns ? '' : 'none';
  document.getElementById('staging-prs-list').style.display = isStagingPrs ? 'block' : 'none';
  document.getElementById('auto-merged-list').style.display = isAutoMerged ? 'block' : 'none';
  document.getElementById('agent-panel').style.display = isAgent ? 'block' : 'none';
  document.getElementById('sidebar-title').textContent = isRuns ? 'Agent runs' : isStagingPrs ? 'Staging PRs' : isAutoMerged ? 'Auto-merged PRs' : 'Agent';
  if (!isRuns) {
    emptyDetailEl.style.display = 'flex';
    detailEl.style.display = 'none';
    activeRunId = null;
    if (isStagingPrs) loadStagingPrs();
    if (isAutoMerged) loadAutoMerges();
    if (isAgent) loadAgentInfo();
    else { agentInfoData = null; activeAgentItem = null; }
  }
  for (const t of document.querySelectorAll('.view-tab'))
    t.classList.toggle('active', t.dataset.view === view);
}

let agentInfoData = null;
let activeAgentItem = null;

function renderAgentPanel(data) {
  agentInfoData = data;
  activeAgentItem = null;
  const panel = document.getElementById('agent-panel');
  const tools = data.tools || [];
  const skills = data.skills || [];
  let html = '';

  html += '<div class="date-group">MCP Tools</div>';
  if (!tools.length) {
    html += '<div class="empty">No tools found — check LITELLM_API_BASE.</div>';
  } else {
    for (let i = 0; i < tools.length; i++) {
      const t = tools[i];
      html += `<div class="run-row" data-agent-type="tool" data-agent-idx="${i}">` +
        `<div class="run-top">` +
        `<span style="width:8px;height:8px;border-radius:50%;background:#5b8;flex-shrink:0;display:inline-block"></span>` +
        `<span class="run-title" style="font-family:ui-monospace,Menlo,monospace;font-size:11.5px">${escapeHtml(t.name)}</span>` +
        `</div>` +
        `<div class="run-liner">${escapeHtml(t.description)}</div>` +
        `</div>`;
    }
  }

  html += '<div class="date-group">Skills</div>';
  if (!skills.length) {
    html += '<div class="empty">No skills found.</div>';
  } else {
    for (let i = 0; i < skills.length; i++) {
      const s = skills[i];
      const firstSentence = s.description.split(/\.\s/)[0] + (s.description.includes('. ') ? '.' : '');
      html += `<div class="run-row" data-agent-type="skill" data-agent-idx="${i}">` +
        `<div class="run-top">` +
        `<span style="width:8px;height:8px;border-radius:50%;background:#88a;flex-shrink:0;display:inline-block"></span>` +
        `<span class="run-title" style="font-family:ui-monospace,Menlo,monospace;font-size:11.5px">${escapeHtml(s.title)}</span>` +
        `</div>` +
        `<div class="run-liner">${escapeHtml(firstSentence)}</div>` +
        `</div>`;
    }
  }

  panel.innerHTML = html;

  for (const row of panel.querySelectorAll('.run-row[data-agent-type]')) {
    row.addEventListener('click', () => {
      const type = row.dataset.agentType;
      const idx = parseInt(row.dataset.agentIdx, 10);
      for (const r of panel.querySelectorAll('.run-row')) r.classList.remove('active');
      row.classList.add('active');
      activeAgentItem = { type, idx };
      if (type === 'tool') renderAgentToolDetail(agentInfoData.tools[idx]);
      else renderAgentSkillDetail(agentInfoData.skills[idx]);
    });
  }
}

function renderAgentToolDetail(tool) {
  emptyDetailEl.style.display = 'none';
  detailEl.style.display = 'block';
  const schema = tool.inputSchema ? JSON.stringify(tool.inputSchema, null, 2) : '{}';
  const props = tool.inputSchema?.properties || {};
  const required = new Set(tool.inputSchema?.required || []);
  const paramRows = Object.entries(props).map(([k, v]) => {
    const req = required.has(k) ? '<span style="color:#c00;margin-left:4px">*</span>' : '';
    const type = v.type || (v.enum ? 'enum' : '');
    const desc = v.description || (v.enum ? v.enum.join(' | ') : '');
    return `<tr>
      <td style="padding:6px 10px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;white-space:nowrap;vertical-align:top">${escapeHtml(k)}${req}</td>
      <td style="padding:6px 10px;font-size:11px;color:#888;vertical-align:top">${escapeHtml(type)}</td>
      <td style="padding:6px 10px;font-size:12px;color:#444;vertical-align:top">${escapeHtml(desc)}</td>
    </tr>`;
  }).join('');

  detailEl.innerHTML = `
    <div class="detail-header">
      <div class="detail-head">
        <h1 style="font-family:ui-monospace,Menlo,monospace;font-size:16px">${escapeHtml(tool.name)}</h1>
        <span class="scope-tag scope-slack">MCP Tool</span>
      </div>
      <div class="detail-meta">${escapeHtml(tool.description)}</div>
    </div>
    <div class="detail-left" style="padding:20px 28px 40px">
      ${paramRows ? `<div class="section">
        <h3>Parameters</h3>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="border-bottom:1px solid #e0e0e3">
            <th style="padding:4px 10px;text-align:left;font-size:11px;color:#888;font-weight:600;text-transform:uppercase">Name</th>
            <th style="padding:4px 10px;text-align:left;font-size:11px;color:#888;font-weight:600;text-transform:uppercase">Type</th>
            <th style="padding:4px 10px;text-align:left;font-size:11px;color:#888;font-weight:600;text-transform:uppercase">Description</th>
          </tr></thead>
          <tbody>${paramRows}</tbody>
        </table>
      </div>` : ''}
      <details class="json-section">
        <summary>Input schema (full JSON)</summary>
        <div class="json-body"><pre>${escapeHtml(schema)}</pre></div>
      </details>
    </div>
  `;
}

function renderAgentSkillDetail(skill) {
  emptyDetailEl.style.display = 'none';
  detailEl.style.display = 'block';
  detailEl.innerHTML = `
    <div class="detail-header">
      <div class="detail-head">
        <h1 style="font-family:ui-monospace,Menlo,monospace;font-size:16px">${escapeHtml(skill.title)}</h1>
        <span class="scope-tag scope-eval">Skill</span>
      </div>
    </div>
    <div class="detail-left" style="padding:20px 28px 40px">
      <div class="section">
        <h3>Description</h3>
        <div class="card-text">${escapeHtml(skill.description)}</div>
      </div>
    </div>
  `;
}

async function loadAgentInfo() {
  const panel = document.getElementById('agent-panel');
  panel.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const r = await authFetch('/api/agent-info');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    renderAgentPanel(await r.json());
  } catch (err) {
    panel.innerHTML = '<div class="empty err">' + escapeHtml(String(err)) + '</div>';
  }
}

for (const tab of document.querySelectorAll('.view-tab')) {
  tab.addEventListener('click', () => setView(tab.dataset.view));
}

// --- Staging PRs -------------------------------------------------------------

function fmtRelative(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

async function loadStagingPrs() {
  const listEl = document.getElementById('staging-prs-list');
  const statusEl = document.getElementById('staging-status');
  statusEl.textContent = 'Loading…';
  try {
    const r = await authFetch('/api/v1/staging-prs?repo=BerriAI/litellm');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const prs = await r.json();
    statusEl.textContent = prs.length + ' open';
    if (!prs.length) {
      listEl.innerHTML = '<div class="empty">No open staging PRs.</div>';
      return;
    }
    listEl.innerHTML = prs.map(pr => `
      <a class="staging-row" href="${escapeHtml(pr.html_url)}" target="_blank" rel="noopener">
        <div class="staging-row-top">
          <span class="staging-pr-num">#${pr.number}</span>
          <span class="staging-pr-title">${escapeHtml(pr.title)}</span>
          <span class="staging-pr-branch">${escapeHtml(pr.branch.replace('litellm_agent_oss_staging_', ''))}</span>
        </div>
        <div class="staging-pr-meta">${escapeHtml(pr.author)} · updated ${fmtRelative(pr.updated_at)} · → ${escapeHtml(pr.base)}</div>
      </a>
    `).join('');
  } catch (err) {
    statusEl.textContent = '';
    listEl.innerHTML = '<div class="empty err">' + escapeHtml(String(err)) + '</div>';
  }
}

document.getElementById('staging-refresh-btn').addEventListener('click', loadStagingPrs);

// --- Auto-merged PRs ---------------------------------------------------------

async function loadAutoMerges() {
  const listEl = document.getElementById('auto-merged-list');
  listEl.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const r = await authFetch('/api/v1/auto-merges?limit=200');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const merges = await r.json();
    if (!merges.length) {
      listEl.innerHTML = '<div class="empty">No auto-merged PRs yet.</div>';
      return;
    }
    let lastGroup = null;
    let html = '';
    for (const m of merges) {
      const d = new Date(m.merged_at_epoch * 1000);
      const group = dateGroupLabel(m.merged_at_epoch);
      if (group !== lastGroup) {
        html += `<div class="date-group">${escapeHtml(group)}</div>`;
        lastGroup = group;
      }
      const prUrl = `https://github.com/${escapeHtml(m.repo)}/pull/${m.pr_number}`;
      const title = m.pr_title && !m.pr_title.startsWith('http')
        ? escapeHtml(m.pr_title)
        : '#' + m.pr_number;
      const time = d.toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit'});
      const stagingLink = m.staging_pr_url
        ? `<a href="${escapeHtml(m.staging_pr_url)}" target="_blank" rel="noopener" style="color:#0a5">Staging PR #${m.staging_pr_number} ↗</a>`
        : '—';
      html += `<div class="auto-merged-row">
        <div class="staging-row-top">
          <span class="staging-pr-num">#${m.pr_number}</span>
          <a href="${prUrl}" target="_blank" rel="noopener" class="staging-pr-title" style="color:#06c;text-decoration:none">${title}</a>
          <span class="auto-merged-badge">merged</span>
        </div>
        <div class="staging-pr-meta">${m.pr_author ? escapeHtml(m.pr_author) + ' · ' : ''}${time} · ${stagingLink}</div>
      </div>`;
    }
    listEl.innerHTML = html;
  } catch (err) {
    listEl.innerHTML = '<div class="empty err">' + escapeHtml(String(err)) + '</div>';
  }
}

// --- Filter tabs --------------------------------------------------------------
for (const tab of document.querySelectorAll('.filter-tab')) {
  tab.addEventListener('click', () => {
    activeFilter = tab.dataset.filter;
    for (const t of document.querySelectorAll('.filter-tab')) t.classList.toggle('active', t.dataset.filter === activeFilter);
    renderRunsList();
  });
}

// --- Backfill button ----------------------------------------------------------
document.getElementById('backfill-btn').addEventListener('click', async () => {
  const btn = document.getElementById('backfill-btn');
  const statusEl = document.getElementById('backfill-status');
  const limit = parseInt(document.getElementById('backfill-limit').value, 10) || 20;
  btn.disabled = true;
  statusEl.style.color = '#888';
  statusEl.textContent = 'Queuing…';
  try {
    const r = await authFetch(`/api/v1/backfill?limit=${limit}&repo=BerriAI/litellm`, { method: 'POST' });
    if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + await r.text());
    const data = await r.json();
    statusEl.style.color = '#0a5';
    statusEl.textContent = `Queued ${data.queued} PRs. Runs will appear as they complete.`;
    setTimeout(() => refresh(), 10000);
  } catch (err) {
    statusEl.style.color = '#c00';
    statusEl.textContent = String(err);
  } finally {
    btn.disabled = false;
  }
});
</script>
